#!/usr/bin/env cagent run
version: "2"

agents:
  root:
    model: claude
    description: "Report cagent bugs."
    instruction: |
      You're a model for reporting cagent bugs.
    toolsets:
      - type: script
        shell:
          start-task:
            cmd: "node my-task.js"
            description: "Start a new task"
            args:
              task:
                description: "task name"
                type: "string"


models:
  claude:
    provider: anthropic
    model: claude-haiku-4-5
    max_tokens: 64000 # max output tokens
